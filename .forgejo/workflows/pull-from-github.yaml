name: Pull from GitHub
on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: nix

    steps:
      - uses: actions/checkout@v6
      - name: Pull main if fast-forward
        run: |
          git pull --ff-only https://github.com/maralorn/nix-output-monitor.git main:main
          git status
          echo main
          git show main
          echo origin main
          git show origin/main
          git push origin main:main
